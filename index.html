<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nuova Toponomastica Aumentata - Comune di Cagliari</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
background:#dfe7ee;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}

#app{
width:min(100vw,390px);
aspect-ratio:9/16;
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.25);
display:flex;
flex-direction:column;
position:relative;
}

#header img{width:100%;display:block;}

#topBar{
padding:10px;
text-align:center;
font-size:13px;
font-weight:800;
background:#fff;
border-bottom:1px solid #ddd;
line-height:16px;
min-height:52px;
position:relative;
z-index:1000;
}

#mapWrap{
position:relative;
flex:1;
width:100%;
}

#map{
width:100%;
height:100%;
}

/* NUOVO PULSANTE + */
#plusBtn{
position:absolute;
top:12px;
right:12px;
width:62px;
height:62px;
border:none;
border-radius:50%;
background:#ff0000;
color:#fff;
font-size:40px;
font-weight:900;
line-height:62px;
cursor:pointer;
z-index:1500;
box-shadow:0 0 0 rgba(255,0,0,.7);
animation:strongPulse 1.1s infinite;
}

@keyframes strongPulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(255,0,0,.65);
}
50%{
transform:scale(1.12);
box-shadow:0 0 0 16px rgba(255,0,0,0);
}
100%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(255,0,0,0);
}
}

/* PANEL */
#poiPanel{
position:absolute;
left:12px;
right:12px;
top:88px;
max-height:48%;
background:#fff;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
z-index:1600;
display:none;
overflow:hidden;
}

#poiPanelHeader{
padding:12px;
font-weight:700;
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
}

#poiList{
max-height:280px;
overflow:auto;
}

.poiItem{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
font-size:14px;
font-weight:600;
}

.poiItem:hover{background:#f6f6f6}

/* CARD */
#detailCard{
position:absolute;
left:12px;
right:12px;
top:24%;
background:#fff;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
z-index:1700;
display:none;
padding:14px;
}

#detailCard h2{font-size:18px;margin-bottom:8px}
#detailCard p{font-size:14px;margin:6px 0}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:700;
cursor:pointer;
}

.dark{background:#000;color:#fff}
.light{background:#e9e9e9}

/* FOOTER */
footer{
height:95px;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
}

.rss{
height:24px;
overflow:hidden;
white-space:nowrap;
border-top:1px solid rgba(255,255,255,.08);
border-bottom:1px solid rgba(255,255,255,.08);
}

.track{
display:inline-block;
padding-left:100%;
animation:scroll 30s linear infinite;
line-height:24px;
font-size:12px;
}

.phoneLink{
color:#00ffd0;
text-decoration:none;
font-weight:700;
margin-right:24px;
}

.brand{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
letter-spacing:1px;
color:#ddd;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div id="app">

<div id="header">
<img src="Header in PNG 1080x260.png" alt="Header Comune">
</div>

<div id="topBar">
I punti di interesse mappati sono quelli esistenti entro un raggio di 1 Km
</div>

<div id="mapWrap">
<div id="map"></div>

<button id="plusBtn">+</button>

<!-- MENU -->
<div id="poiPanel">
<div id="poiPanelHeader">
<span>Punti di Interesse</span>
<button onclick="closePanel()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">✕</button>
</div>
<div id="poiList"></div>
</div>
</div>

<!-- CARD -->
<div id="detailCard">
<h2 id="poiTitle"></h2>
<p id="poiDistance"></p>
<p id="poiTransport"></p>
<button class="btn dark" id="wikiBtn">Wikipedia</button>
<button class="btn dark" id="goBtn">Portami lì</button>
<button class="btn light" onclick="closeCard()">Chiudi</button>
</div>

<footer>
<div class="rss">
<div class="track">
🎉 Concerto in piazza Centrale ore 21:00 • Apertura mostra fotografica ore 18:00 •
</div>
</div>

<div class="rss">
<div class="track">
<a class="phoneLink" href="tel:41211">📞 Taxi 41211</a>
<a class="phoneLink" href="tel:606121">📞 Guardia Medica 606121</a>
<a class="phoneLink" href="tel:603333">📞 Veterinario 603333</a>
</div>
</div>

<div class="brand">PASSAMONTI_COMMUNICATION</div>
</footer>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function(){

const map=L.map("map",{
zoomControl:true,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false,
boxZoom:false,
keyboard:false,
touchZoom:false
}).setView([39.2238,9.1217],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let userLat=39.2238,userLng=9.1217;
let userMarker=null;
let poiLayer=L.layerGroup().addTo(map);
let poiData=[];

/* GPS */
async function initLocation(){
return new Promise((resolve)=>{
if(!navigator.geolocation){resolve();return;}
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
resolve();
},err=>resolve(),{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
});
});
}

async function reverseStreet(lat,lng){
try{
const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
const d=await r.json();
return d.address.road||d.address.pedestrian||d.address.suburb||"Posizione rilevata";
}catch(e){
return "Posizione rilevata";
}
}

function userIcon(via){
return L.divIcon({
className:"",
html:`
<div style="text-align:center">
<div style="width:28px;height:28px;background:red;border-radius:50%;border:4px solid #fff;margin:auto"></div>
<div style="background:#000;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;margin-top:4px;display:inline-block">TU SEI QUI</div>
<div style="background:#fff;color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;margin-top:3px;display:inline-block">${via}</div>
</div>
`,
iconSize:[150,90]
});
}

async function drawUser(){
const via=await reverseStreet(userLat,userLng);
if(userMarker) map.removeLayer(userMarker);
userMarker=L.marker([userLat,userLng],{icon:userIcon(via)}).addTo(map);
map.setView([userLat,userLng],16);
}

async function loadPOI(){
poiLayer.clearLayers();
poiData=[];

try{
const url=`https://it.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${userLat}|${userLng}&gsradius=1000&gslimit=30&format=json&origin=*`;
const r=await fetch(url);
const d=await r.json();

poiData=(d.query.geosearch||[]).sort((a,b)=>a.dist-b.dist);

poiData.forEach(item=>{
const marker=L.circleMarker([item.lat,item.lon],{
radius:7,color:"#000",weight:2,fillColor:"#2196f3",fillOpacity:1
}).addTo(poiLayer);

marker.on("click",()=>openDetail(item));
});

renderList();

}catch(e){console.log(e);}
}

function renderList(){
const list=document.getElementById("poiList");
list.innerHTML="";
poiData.forEach(item=>{
const row=document.createElement("div");
row.className="poiItem";
row.innerHTML=`${item.title} - ${(item.dist/1000).toFixed(2)} km`;
row.onclick=()=>{
document.getElementById("poiPanel").style.display="none";
};
list.appendChild(row);
});
}

function openDetail(item){
document.getElementById("poiTitle").innerText=item.title;
document.getElementById("poiDistance").innerText="Distanza a piedi: "+(item.dist/1000).toFixed(2)+" km";
document.getElementById("poiTransport").innerText="Mezzo di trasporto: verificabile localmente";

document.getElementById("wikiBtn").onclick=()=>{
window.open("https://it.wikipedia.org/wiki/"+encodeURIComponent(item.title),"_blank");
};

document.getElementById("goBtn").onclick=()=>{
window.open(`https://www.google.com/maps/dir/${userLat},${userLng}/${item.lat},${item.lon}`,"_blank");
};

document.getElementById("detailCard").style.display="block";
}

window.closePanel=function(){
document.getElementById("poiPanel").style.display="none";
}

window.closeCard=function(){
document.getElementById("detailCard").style.display="none";
}

document.getElementById("plusBtn").onclick=function(){
const p=document.getElementById("poiPanel");
p.style.display=(p.style.display==="block")?"none":"block";
}

/* START */
await initLocation();
await drawUser();
await loadPOI();

setInterval(async()=>{
await initLocation();
await drawUser();
await loadPOI();
},300000);

});
</script>

</body>
</html>
