<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comune di Cagliari - Nuova Toponomastica Aumentata</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
body{
background:#dfe7ee;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}
#phone{
width:min(100vw,390px);
aspect-ratio:9/16;
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.25);
display:flex;
flex-direction:column;
position:relative;
}
#headerImg{width:100%;display:block;}
#map{flex:1;width:100%;}

footer{
height:95px;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
}

.rss{
height:24px;
overflow:hidden;
white-space:nowrap;
border-top:1px solid rgba(255,255,255,.08);
border-bottom:1px solid rgba(255,255,255,.08);
}

.track{
display:inline-block;
padding-left:100%;
animation:scroll 30s linear infinite;
line-height:24px;
font-size:12px;
}

.phoneLink{
color:#00ffd0;
text-decoration:none;
font-weight:bold;
margin-right:24px;
}

.brand{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
letter-spacing:1px;
color:#ddd;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.poiCard{
position:absolute;
top:28%;
left:12px;
right:12px;
background:#fff;
padding:14px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
z-index:9999;
display:none;
}

.poiCard h2{font-size:18px;margin-bottom:8px;}
.poiCard p{font-size:14px;margin:5px 0;}

.poiCard button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
cursor:pointer;
}

.go{background:#000;color:#fff;}
.close{background:#ddd;}
</style>
</head>

<body>

<div id="phone">

<img id="headerImg" src="Header in PNG 1080x260.png" alt="Header Comune di Cagliari">

<div id="map"></div>

<div class="poiCard" id="card">
<h2 id="poiTitle"></h2>
<p id="poiDesc"></p>
<p id="poiDistance"></p>
<button class="go" id="goBtn">VEDI SU WIKIPEDIA</button>
<button class="close" onclick="closeCard()">CHIUDI</button>
</div>

<footer>
<div class="rss">
<div class="track">
🎉 Eventi Cagliari • Concerto Piazza Yenne ore 21:00 • Mostra Bastione ore 18:00 • Festival Marina ore 20:30 •
</div>
</div>

<div class="rss">
<div class="track">
<a class="phoneLink" href="tel:41211">📞 Taxi 41211</a>
<a class="phoneLink" href="tel:606121">📞 Guardia Medica</a>
<a class="phoneLink" href="tel:603333">📞 Veterinario</a>
<a class="phoneLink" href="tel:112">📞 Emergenze</a>
</div>
</div>

<div class="brand">PASSAMONTI_COMMUNICATION</div>
</footer>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded",function(){

const map=L.map("map",{
zoomControl:false,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false,
boxZoom:false,
keyboard:false,
touchZoom:false
}).setView([39.2238,9.1217],14);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let userMarker=null;
let poiLayer=L.layerGroup().addTo(map);
let userLat=39.2238;
let userLng=9.1217;

/* ICONA UTENTE */
function createUserIcon(via){
return L.divIcon({
className:"",
html:`
<div style="text-align:center">
<div style="width:30px;height:30px;background:red;border-radius:50%;border:4px solid white;margin:auto"></div>

<div style="
font-size:11px;
font-weight:bold;
color:#fff;
background:#000;
padding:3px 8px;
border-radius:8px;
margin-top:4px;
display:inline-block;
">TU SEI QUI</div>

<div style="
font-size:10px;
font-weight:bold;
color:#000;
background:rgba(255,255,255,.9);
padding:2px 6px;
border-radius:8px;
margin-top:3px;
display:inline-block;
max-width:130px;
">${via}</div>
</div>
`,
iconSize:[145,90]
});
}

/* VIA */
async function getStreetName(lat,lng){
try{
const res=await fetch(
`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`
);
const data=await res.json();
return data.address.road ||
data.address.pedestrian ||
data.address.suburb ||
data.address.city ||
"Posizione rilevata";
}catch(e){
return "Posizione rilevata";
}
}

/* AGGIORNA UTENTE */
async function updateUser(lat,lng){
userLat=lat;
userLng=lng;

const via=await getStreetName(lat,lng);
const icon=createUserIcon(via);

if(userMarker){
userMarker.setLatLng([lat,lng]);
userMarker.setIcon(icon);
}else{
userMarker=L.marker([lat,lng],{icon}).addTo(map);
}

map.setView([lat,lng],15);
}

/* DISTANZA */
function km(lat1,lon1,lat2,lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return (R*c).toFixed(2);
}

/* WIKIPEDIA LIVE */
async function loadWikipediaPOI(lat,lng){

poiLayer.clearLayers();

try{
const url=`https://it.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=3000&gslimit=20&format=json&origin=*`;

const res=await fetch(url);
const data=await res.json();

data.query.geosearch.forEach(function(item){

const marker=L.circleMarker(
[item.lat,item.lon],
{
radius:9,
color:"#000",
fillColor:"#007bff",
fillOpacity:0.95,
weight:2
}
).addTo(poiLayer);

marker.bindTooltip(item.title,{
permanent:true,
direction:"bottom",
offset:[0,10],
className:"wikiLabel"
});

marker.on("click",function(){

document.getElementById("poiTitle").innerText=item.title;
document.getElementById("poiDesc").innerText="Punto di interesse rilevato da Wikipedia.";
document.getElementById("poiDistance").innerText=
"Distanza: "+km(userLat,userLng,item.lat,item.lon)+" km";

document.getElementById("goBtn").onclick=function(){
window.open(
"https://it.wikipedia.org/wiki/"+encodeURIComponent(item.title),
"_blank"
);
};

document.getElementById("card").style.display="block";
});

});

}catch(e){
console.log("Errore Wikipedia",e);
}
}

/* GPS + LIVE */
function refreshAll(lat,lng){
updateUser(lat,lng);
loadWikipediaPOI(lat,lng);
}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(
function(pos){
refreshAll(
pos.coords.latitude,
pos.coords.longitude
);
},
function(err){
refreshAll(userLat,userLng);
},
{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}
);

navigator.geolocation.watchPosition(
function(pos){
refreshAll(
pos.coords.latitude,
pos.coords.longitude
);
},
function(err){},
{
enableHighAccuracy:true,
maximumAge:10000,
timeout:10000
}
);

}else{
refreshAll(userLat,userLng);
}

window.closeCard=function(){
document.getElementById("card").style.display="none";
}

});
</script>

</body>
</html>
