<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comune di Cagliari - Nuova Toponomastica Aumentata</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}

body{
background:#dfe7ee;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}

#phone{
width:min(100vw,390px);
aspect-ratio:9/16;
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.25);
display:flex;
flex-direction:column;
position:relative;
}

/* HEADER */
#headerImg{
width:100%;
display:block;
}

/* MAPPA */
#map{
flex:1;
width:100%;
}

/* FOOTER */
footer{
height:95px;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
}

.rss{
height:24px;
overflow:hidden;
white-space:nowrap;
border-top:1px solid rgba(255,255,255,.08);
border-bottom:1px solid rgba(255,255,255,.08);
}

.track{
display:inline-block;
padding-left:100%;
animation:scroll 30s linear infinite;
line-height:24px;
font-size:12px;
}

.phoneLink{
color:#00ffd0;
text-decoration:none;
font-weight:bold;
margin-right:24px;
}

.brand{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
letter-spacing:1px;
color:#ddd;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CARD */
.poiCard{
position:absolute;
top:28%;
left:12px;
right:12px;
background:#fff;
padding:14px;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
z-index:9999;
display:none;
}

.poiCard h2{font-size:18px;margin-bottom:8px;}
.poiCard p{font-size:14px;margin:5px 0;}

.poiCard button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
cursor:pointer;
}

.go{background:#000;color:#fff;}
.close{background:#ddd;}

/* MARKERS */
.poiWrap{text-align:center;}

.poiDot{
width:28px;
height:28px;
border-radius:50%;
border:3px solid #fff;
margin:auto;
box-shadow:0 3px 8px rgba(0,0,0,.3);
}

.poiText{
font-size:10px;
font-weight:bold;
color:#111;
margin-top:4px;
width:120px;
margin-left:-46px;
line-height:11px;
text-align:center;
}
</style>
</head>

<body>

<div id="phone">

<img id="headerImg" src="Header in PNG 1080x260.png" alt="Header Comune di Cagliari">

<div id="map"></div>

<div class="poiCard" id="card">
<h2 id="poiTitle"></h2>
<p id="poiDesc"></p>
<p id="poiTransport"></p>
<p id="poiDistance"></p>
<button class="go" id="goBtn">PORTAMI QUI</button>
<button class="close" onclick="closeCard()">CHIUDI</button>
</div>

<footer>
<div class="rss">
<div class="track">
🎉 Eventi Cagliari • Concerto Piazza Yenne ore 21:00 • Mostra Bastione ore 18:00 • Festival Marina ore 20:30 •
</div>
</div>

<div class="rss">
<div class="track">
<a class="phoneLink" href="tel:41211">📞 Taxi 41211</a>
<a class="phoneLink" href="tel:606121">📞 Guardia Medica</a>
<a class="phoneLink" href="tel:603333">📞 Veterinario</a>
<a class="phoneLink" href="tel:112">📞 Emergenze</a>
</div>
</div>

<div class="brand">PASSAMONTI_COMMUNICATION</div>
</footer>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded",function(){

const map=L.map("map",{
zoomControl:false,
dragging:false,
scrollWheelZoom:false,
doubleClickZoom:false,
boxZoom:false,
keyboard:false,
touchZoom:false
}).setView([39.2238,9.1217],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let userLat=39.2238;
let userLng=9.1217;
let userMarker=null;

const userIcon=L.divIcon({
className:"",
html:`
<div style="text-align:center">
<div style="width:30px;height:30px;background:red;border-radius:50%;border:4px solid white;margin:auto"></div>
<div style="font-size:12px;font-weight:bold;color:red;margin-top:4px;">TU SEI QUI</div>
</div>
`,
iconSize:[100,60]
});

/* GEOLOCALIZZAZIONE REALE GPS */
function setUserPosition(lat,lng){
userLat=lat;
userLng=lng;

if(userMarker){
userMarker.setLatLng([lat,lng]);
}else{
userMarker=L.marker([lat,lng],{icon:userIcon}).addTo(map);
}

map.setView([lat,lng],15);
}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(
function(pos){
setUserPosition(
pos.coords.latitude,
pos.coords.longitude
);
},
function(err){
setUserPosition(userLat,userLng);
},
{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}
);

/* AGGIORNA MENTRE CAMMINI */
navigator.geolocation.watchPosition(
function(pos){
setUserPosition(
pos.coords.latitude,
pos.coords.longitude
);
},
function(err){},
{
enableHighAccuracy:true,
maximumAge:5000,
timeout:10000
}
);

}else{
setUserPosition(userLat,userLng);
}

/* POI */
const pois=[
["Basilica di Bonaria",39.2107,9.1294,"Santuario simbolo di Cagliari.","Bus 5 - 6","#0055ff"],
["Orto Botanico",39.2231,9.1116,"Giardino botanico storico.","Bus 1 - 9","#00aa44"],
["Bastione Saint Remy",39.2168,9.1178,"Belvedere panoramico.","Bus 6 - 7","#ff8800"],
["Poetto",39.1999,9.1535,"Spiaggia cittadina.","Bus PF - PQ","#00bcd4"],
["Duomo di Cagliari",39.2190,9.1160,"Cattedrale storica.","Bus 8","#8e44ad"],
["Museo Archeologico",39.2210,9.1122,"Museo nazionale archeologico.","Bus 1","#e91e63"]
];

pois.forEach(function(p){

const obj={name:p[0],lat:p[1],lng:p[2],desc:p[3],transport:p[4],color:p[5]};

const icon=L.divIcon({
className:"",
html:`
<div class="poiWrap">
<div class="poiDot" style="background:${obj.color};"></div>
<div class="poiText">${obj.name}</div>
</div>
`,
iconSize:[120,60]
});

L.marker([obj.lat,obj.lng],{icon})
.addTo(map)
.on("click",function(){showCard(obj);});

});

function km(lat1,lon1,lat2,lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return (R*c).toFixed(2);
}

window.showCard=function(p){
document.getElementById("poiTitle").innerText=p.name;
document.getElementById("poiDesc").innerText=p.desc;
document.getElementById("poiTransport").innerText="Trasporti: "+p.transport;
document.getElementById("poiDistance").innerText="Distanza: "+km(userLat,userLng,p.lat,p.lng)+" km";

document.getElementById("goBtn").onclick=function(){
window.open(
"https://www.google.com/maps/dir/"+userLat+","+userLng+"/"+p.lat+","+p.lng,
"_blank"
);
};

document.getElementById("card").style.display="block";
}

window.closeCard=function(){
document.getElementById("card").style.display="none";
}

});
</script>

</body>
</html>
